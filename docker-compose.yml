version: '3.8'

services:
  bot:
    build: .
    container_name: tournament-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - bot-network

  mongo:
    image: mongo:latest
    container_name: tournament-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  mongo-data:
